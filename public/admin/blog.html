<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | RelevaCore Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-logo"><i class="fas fa-cube"></i> <span>RelevaCore</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="/admin/leads" class="nav-item"><i class="fas fa-user-plus"></i> <span>Leads</span></a>
        <a href="/admin/consultations" class="nav-item"><i class="fas fa-calendar-check"></i> <span>Consultations</span></a>
        <a href="/admin/blog" class="nav-item active"><i class="fas fa-edit"></i> <span>Blog</span></a>
        <a href="/admin/portfolio" class="nav-item"><i class="fas fa-briefcase"></i> <span>Portfolio</span></a>
        <a href="/admin/newsletter" class="nav-item"><i class="fas fa-envelope"></i> <span>Newsletter</span></a>
        <div class="nav-divider"></div>
        <a href="/" class="nav-item"><i class="fas fa-external-link-alt"></i> <span>View Site</span></a>
        <button class="nav-item" onclick="logout()" style="border:none;background:none;width:100%;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <div>
          <h1>Blog Posts</h1>
          <p class="subtitle">Create and manage insights articles.</p>
        </div>
      </div>

      <!-- Editor -->
      <div class="editor-container" id="editorSection" style="display:none;">
        <h3 id="editorTitle">New Post</h3>
        <input type="hidden" id="editingId">
        <div class="form-row">
          <div class="form-group">
            <label for="postTitle">Title *</label>
            <input type="text" id="postTitle" placeholder="Post title">
          </div>
          <div class="form-group">
            <label for="postCategory">Category</label>
            <select id="postCategory">
              <option value="insights">General</option>
              <option value="strategy">Strategy</option>
              <option value="design">Design</option>
              <option value="marketing">Marketing</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label for="postExcerpt">Excerpt</label>
          <input type="text" id="postExcerpt" placeholder="Brief summary (shown in listing)">
        </div>
        <div class="form-group">
          <label for="postContent">Content (HTML)</label>
          <textarea class="content-editor" id="postContent" placeholder="Write your post content here. You can use HTML tags like <h2>, <p>, <ul>, <strong> etc."></textarea>
        </div>
        <div class="form-group">
          <label for="postTags">Tags</label>
          <input type="text" id="postTags" placeholder="tag1, tag2, tag3">
        </div>
        <div class="editor-actions">
          <button class="btn-primary" onclick="savePost('published')"><i class="fas fa-globe"></i> Publish</button>
          <button class="btn-secondary" onclick="savePost('draft')"><i class="fas fa-save"></i> Save Draft</button>
          <button class="btn-secondary" onclick="cancelEdit()"><i class="fas fa-times"></i> Cancel</button>
        </div>
      </div>

      <!-- Posts List -->
      <div class="admin-toolbar">
        <select class="status-select" id="statusFilter" onchange="loadPosts()" style="padding:0.6rem 1rem;border-radius:12px;">
          <option value="">All</option>
          <option value="draft">Drafts</option>
          <option value="published">Published</option>
          <option value="archived">Archived</option>
        </select>
        <button class="btn-primary" onclick="showEditor()"><i class="fas fa-plus"></i> New Post</button>
      </div>

      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Category</th>
              <th>Status</th>
              <th>Views</th>
              <th>Date</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="6" style="text-align:center;padding:3rem;color:#71717a;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!API.isLoggedIn()) window.location.href = '/admin';
    function logout() { API.clearToken(); window.location.href = '/admin'; }

    function showEditor(post = null) {
      const section = document.getElementById('editorSection');
      section.style.display = 'block';
      if (post) {
        document.getElementById('editorTitle').textContent = 'Edit Post';
        document.getElementById('editingId').value = post.id;
        document.getElementById('postTitle').value = post.title;
        document.getElementById('postCategory').value = post.category;
        document.getElementById('postExcerpt').value = post.excerpt || '';
        document.getElementById('postContent').value = post.content;
        document.getElementById('postTags').value = post.tags || '';
      } else {
        document.getElementById('editorTitle').textContent = 'New Post';
        document.getElementById('editingId').value = '';
        document.getElementById('postTitle').value = '';
        document.getElementById('postExcerpt').value = '';
        document.getElementById('postContent').value = '';
        document.getElementById('postTags').value = '';
      }
      section.scrollIntoView({ behavior: 'smooth' });
    }

    function cancelEdit() {
      document.getElementById('editorSection').style.display = 'none';
    }

    async function savePost(status) {
      const id = document.getElementById('editingId').value;
      const data = {
        title: document.getElementById('postTitle').value,
        category: document.getElementById('postCategory').value,
        excerpt: document.getElementById('postExcerpt').value,
        content: document.getElementById('postContent').value,
        tags: document.getElementById('postTags').value,
        status
      };

      if (!data.title || !data.content) {
        showToast('Title and content are required', 'error');
        return;
      }

      try {
        if (id) {
          await API.updatePost(id, data);
          showToast('Post updated!', 'success');
        } else {
          await API.createPost(data);
          showToast('Post created!', 'success');
        }
        cancelEdit();
        loadPosts();
      } catch (err) {
        showToast(err.error || 'Failed to save', 'error');
      }
    }

    async function loadPosts() {
      const status = document.getElementById('statusFilter').value;
      const params = status ? `status=${status}` : '';
      try {
        const data = await API.getAllPosts(params);
        const tbody = document.getElementById('tableBody');
        if (data.posts.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:3rem;color:#71717a;">No posts yet. Create your first post!</td></tr>';
          return;
        }
        tbody.innerHTML = data.posts.map(p => `
          <tr>
            <td><strong>${p.title}</strong><br><span style="color:#52525b;font-size:0.75rem;">/insights/${p.slug}</span></td>
            <td>${p.category}</td>
            <td><span class="status-badge status-${p.status}">${p.status}</span></td>
            <td>${p.views}</td>
            <td style="white-space:nowrap;">${new Date(p.created_at).toLocaleDateString()}</td>
            <td>
              <div class="table-actions">
                <button class="btn-icon" title="Edit" onclick='editPost(${JSON.stringify(p).replace(/'/g,"&apos;")})'><i class="fas fa-edit"></i></button>
                ${p.status === 'published' ? `<a class="btn-icon" href="/insights/${p.slug}" target="_blank" title="View"><i class="fas fa-external-link-alt"></i></a>` : ''}
                <button class="btn-icon danger" onclick="deletePost(${p.id})"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) { console.error(err); }
    }

    function editPost(post) {
      showEditor(post);
    }

    async function deletePost(id) {
      if (!confirm('Delete this post?')) return;
      try { await API.deletePost(id); showToast('Deleted', 'success'); loadPosts(); }
      catch { showToast('Failed', 'error'); }
    }

    loadPosts();
  </script>
</body>
</html>
