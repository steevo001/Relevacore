<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Newsletter | RelevaCore Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-logo"><i class="fas fa-cube"></i> <span>RelevaCore</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="/admin/leads" class="nav-item"><i class="fas fa-user-plus"></i> <span>Leads</span></a>
        <a href="/admin/consultations" class="nav-item"><i class="fas fa-calendar-check"></i> <span>Consultations</span></a>
        <a href="/admin/blog" class="nav-item"><i class="fas fa-edit"></i> <span>Blog</span></a>
        <a href="/admin/portfolio" class="nav-item"><i class="fas fa-briefcase"></i> <span>Portfolio</span></a>
        <a href="/admin/newsletter" class="nav-item active"><i class="fas fa-envelope"></i> <span>Newsletter</span></a>
        <div class="nav-divider"></div>
        <a href="/" class="nav-item"><i class="fas fa-external-link-alt"></i> <span>View Site</span></a>
        <button class="nav-item" onclick="logout()" style="border:none;background:none;width:100%;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <div>
          <h1>Newsletter Subscribers</h1>
          <p class="subtitle">View and manage email subscribers.</p>
        </div>
        <div class="admin-header-actions">
          <span id="totalCount" style="color:#71717a;font-size:0.9rem;"></span>
        </div>
      </div>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Email</th>
              <th>Name</th>
              <th>Status</th>
              <th>Subscribed On</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center;padding:3rem;color:#71717a;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!API.isLoggedIn()) window.location.href = '/admin';
    function logout() { API.clearToken(); window.location.href = '/admin'; }

    async function loadSubscribers() {
      try {
        const data = await API.getSubscribers();
        document.getElementById('totalCount').textContent = `${data.total} active subscribers`;
        const tbody = document.getElementById('tableBody');
        if (data.subscribers.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:#71717a;"><i class="fas fa-envelope-open" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>No subscribers yet</td></tr>';
          return;
        }
        tbody.innerHTML = data.subscribers.map(s => `
          <tr>
            <td><strong>${s.email}</strong></td>
            <td>${s.name || '—'}</td>
            <td><span class="status-badge ${s.subscribed ? 'status-confirmed' : 'status-cancelled'}">${s.subscribed ? 'Active' : 'Unsubscribed'}</span></td>
            <td>${new Date(s.created_at).toLocaleDateString()}</td>
            <td>
              <div class="table-actions">
                ${s.subscribed ? `<button class="btn-icon danger" title="Unsubscribe" onclick="removeSub(${s.id})"><i class="fas fa-user-minus"></i></button>` : ''}
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) { console.error(err); }
    }

    async function removeSub(id) {
      if (!confirm('Unsubscribe this user?')) return;
      try { await API.unsubscribe(id); showToast('Unsubscribed', 'success'); loadSubscribers(); }
      catch { showToast('Failed', 'error'); }
    }

    loadSubscribers();
  </script>
</body>
</html>
