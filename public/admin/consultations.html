<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultations | RelevaCore Admin</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/shared.css">
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar" id="sidebar">
      <div class="sidebar-header">
        <a href="/" class="sidebar-logo"><i class="fas fa-cube"></i> <span>RelevaCore</span></a>
      </div>
      <nav class="sidebar-nav">
        <a href="/admin/dashboard" class="nav-item"><i class="fas fa-th-large"></i> <span>Dashboard</span></a>
        <a href="/admin/leads" class="nav-item"><i class="fas fa-user-plus"></i> <span>Leads</span></a>
        <a href="/admin/consultations" class="nav-item active"><i class="fas fa-calendar-check"></i> <span>Consultations</span></a>
        <a href="/admin/blog" class="nav-item"><i class="fas fa-edit"></i> <span>Blog</span></a>
        <a href="/admin/portfolio" class="nav-item"><i class="fas fa-briefcase"></i> <span>Portfolio</span></a>
        <a href="/admin/newsletter" class="nav-item"><i class="fas fa-envelope"></i> <span>Newsletter</span></a>
        <div class="nav-divider"></div>
        <a href="/" class="nav-item"><i class="fas fa-external-link-alt"></i> <span>View Site</span></a>
        <button class="nav-item" onclick="logout()" style="border:none;background:none;width:100%;cursor:pointer;"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></button>
      </nav>
    </aside>
    <main class="admin-main">
      <div class="admin-header">
        <div>
          <h1>Consultations</h1>
          <p class="subtitle">Manage consultation bookings and schedules.</p>
        </div>
      </div>
      <div class="admin-toolbar">
        <select class="status-select" id="statusFilter" onchange="loadConsultations()" style="padding:0.6rem 1rem;border-radius:12px;">
          <option value="">All status</option>
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
          <option value="cancelled">Cancelled</option>
        </select>
      </div>
      <div class="admin-table-container">
        <table class="admin-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Email</th>
              <th>Date</th>
              <th>Time</th>
              <th>Topic</th>
              <th>Status</th>
              <th>Booked</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="tableBody">
            <tr><td colspan="8" style="text-align:center;padding:3rem;color:#71717a;">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </main>
  </div>
  <script src="/js/api.js"></script>
  <script>
    if (!API.isLoggedIn()) window.location.href = '/admin';
    function logout() { API.clearToken(); window.location.href = '/admin'; }

    async function loadConsultations() {
      const status = document.getElementById('statusFilter').value;
      const params = status ? `status=${status}` : '';
      try {
        const data = await API.getConsultations(params);
        const tbody = document.getElementById('tableBody');
        if (data.consultations.length === 0) {
          tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:3rem;color:#71717a;"><i class="fas fa-calendar" style="font-size:2rem;display:block;margin-bottom:0.5rem;"></i>No consultations found</td></tr>';
          return;
        }
        tbody.innerHTML = data.consultations.map(c => `
          <tr>
            <td><strong>${c.name}</strong></td>
            <td>${c.email}</td>
            <td>${c.preferred_date || '—'}</td>
            <td>${c.preferred_time || '—'}</td>
            <td>${c.topic || '—'}</td>
            <td>
              <select class="status-select" onchange="updateStatus(${c.id}, this.value)">
                ${['pending','confirmed','completed','cancelled'].map(s => `<option value="${s}" ${c.status === s ? 'selected' : ''}>${s}</option>`).join('')}
              </select>
            </td>
            <td style="white-space:nowrap;">${new Date(c.created_at).toLocaleDateString()}</td>
            <td>
              <div class="table-actions">
                <button class="btn-icon" title="View" onclick="alert('${(c.message || 'No message').replace(/'/g, "\\'")}')"><i class="fas fa-eye"></i></button>
                <button class="btn-icon danger" onclick="deleteConsultation(${c.id})"><i class="fas fa-trash"></i></button>
              </div>
            </td>
          </tr>
        `).join('');
      } catch (err) { console.error(err); }
    }

    async function updateStatus(id, status) {
      try { await API.updateConsultationStatus(id, status); showToast('Updated', 'success'); }
      catch { showToast('Failed', 'error'); loadConsultations(); }
    }

    async function deleteConsultation(id) {
      if (!confirm('Delete this consultation?')) return;
      try { await API.deleteConsultation(id); showToast('Deleted', 'success'); loadConsultations(); }
      catch { showToast('Failed', 'error'); }
    }

    loadConsultations();
  </script>
</body>
</html>
