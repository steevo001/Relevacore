<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Insights | RelevaCore</title>
  <meta name="description" content="Expert insights on branding, marketing strategy, creative design, and performance marketing from the RelevaCore team.">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="/css/shared.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; background: #0b0c10; color: #e4e4e7; line-height: 1.5; overflow-x: hidden; }
    .animated-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at 30% 40%, #1f1b3a 0%, #0b0c10 70%); z-index: -2; }
    .grid-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 50px 50px; z-index: -1; pointer-events: none; }
    .container { max-width: 1280px; margin: 0 auto; padding: 0 2rem; }
    header { display: flex; justify-content: space-between; align-items: center; padding: 1.8rem 0; flex-wrap: wrap; gap: 1rem; }
    .logo { font-size: 2rem; font-weight: 700; background: linear-gradient(135deg,#c084fc,#a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; display: flex; align-items: center; gap: 0.5rem; text-decoration: none; }
    .logo i { background: none; -webkit-text-fill-color: #a855f7; font-size: 2.2rem; }
    .nav-links { display: flex; gap: 2.5rem; font-weight: 500; }
    .nav-links a { color: #d4d4d8; text-decoration: none; position: relative; padding-bottom: 6px; transition: color 0.3s; }
    .nav-links a::after { content: ''; position: absolute; width: 0%; height: 2px; bottom: 0; left: 0; background: #a855f7; transition: width 0.3s ease; }
    .nav-links a:hover { color: #f5f5f5; }
    .nav-links a:hover::after { width: 100%; }
    .nav-links a.active { color: #c084fc; }
    .nav-links a.active::after { width: 100%; }
    .cta-button { background: #a855f7; border: none; padding: 0.75rem 1.8rem; border-radius: 40px; font-weight: 600; color: white; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(168,85,247,0.4); display: inline-flex; align-items: center; gap: 0.4rem; text-decoration: none; font-size: 1rem; }
    .cta-button:hover { background: #9333ea; box-shadow: 0 8px 28px rgba(168,85,247,0.7); transform: translateY(-2px); }
    footer { text-align: center; padding: 2.5rem 0; color: #71717a; border-top: 1px solid rgba(255,255,255,0.05); margin-top: 2rem; }
    @keyframes fadeUp { 0% { opacity: 0; transform: translateY(30px); } 100% { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>
  <div class="animated-bg"></div>
  <div class="grid-overlay"></div>
  <div class="container">
    <header>
      <a href="/" class="logo"><i class="fas fa-cube"></i> RelevaCore</a>
      <div class="nav-links">
        <a href="/work">Work</a>
        <a href="/services">Services</a>
        <a href="/#pricing">Pricing</a>
        <a href="/insights" class="active">Insights</a>
      </div>
      <a href="/#pricing" class="cta-button"><i class="fas fa-comment-dots"></i> Let's talk</a>
    </header>

    <div class="page-header">
      <h1>Insights</h1>
      <p>Deep dives into branding, marketing strategy, and creative excellence from the RelevaCore team.</p>
    </div>

    <div class="filter-chips" id="filterChips">
      <button class="filter-chip active" data-category="">All</button>
      <button class="filter-chip" data-category="strategy">Strategy</button>
      <button class="filter-chip" data-category="design">Design</button>
      <button class="filter-chip" data-category="marketing">Marketing</button>
      <button class="filter-chip" data-category="insights">General</button>
    </div>

    <div class="blog-grid" id="blogGrid">
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
      <div class="skeleton skeleton-card"></div>
    </div>

    <footer>
      <p>© 2025 RelevaCore — Brand agency for the next generation.</p>
    </footer>
  </div>

  <script src="/js/api.js"></script>
  <script>
    let currentCategory = '';

    document.querySelectorAll('.filter-chip').forEach(chip => {
      chip.addEventListener('click', () => {
        document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        currentCategory = chip.dataset.category;
        loadPosts();
      });
    });

    function formatDate(dateStr) {
      if (!dateStr) return '';
      const d = new Date(dateStr);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    }

    async function loadPosts() {
      const grid = document.getElementById('blogGrid');
      grid.innerHTML = '<div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div><div class="skeleton skeleton-card"></div>';

      try {
        const params = currentCategory ? `category=${currentCategory}` : '';
        const data = await API.getPosts(params);

        if (data.posts.length === 0) {
          grid.innerHTML = '<div class="empty-state"><i class="fas fa-newspaper"></i><h3>No posts yet</h3><p>Check back soon for fresh insights.</p></div>';
          return;
        }

        grid.innerHTML = data.posts.map((post, i) => `
          <a href="/insights/${post.slug}" class="blog-card" style="animation: fadeUp 0.6s ease forwards; opacity: 0; animation-delay: ${i * 0.1}s;">
            <div class="card-meta">
              <span><i class="fas fa-tag"></i> ${post.category}</span>
              <span><i class="fas fa-clock"></i> ${formatDate(post.published_at)}</span>
              <span><i class="fas fa-eye"></i> ${post.views || 0}</span>
            </div>
            <h3>${post.title}</h3>
            <p>${post.excerpt || ''}</p>
            <span class="read-more">Read more <i class="fas fa-arrow-right"></i></span>
          </a>
        `).join('');
      } catch (err) {
        grid.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i><h3>Failed to load</h3><p>Please try refreshing the page.</p></div>';
      }
    }

    loadPosts();
  </script>
</body>
</html>
